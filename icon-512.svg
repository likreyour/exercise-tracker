<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#68d391"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="512" height="512" rx="100"/>
  <!-- Outer ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="20"/>
  <!-- Progress ring -->
  <circle cx="256" cy="256" r="192" fill="none" stroke="url(#ring)" stroke-width="20" 
    stroke-dasharray="850 1200" stroke-dashoffset="0" stroke-linecap="round"
    transform="rotate(-90 256 256)"/>
  <!-- Runner emoji -->
  <text x="256" y="300" font-size="200" text-anchor="middle">🏃</text>
  <!-- Step count hint -->
  <text x="256" y="420" font-size="32" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">10,000</text>
</svg>
