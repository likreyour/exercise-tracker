<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
    <linearGradient id="ring" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48bb78"/>
      <stop offset="100%" style="stop-color:#68d391"/>
    </linearGradient>
  </defs>
  <rect fill="url(#bg)" width="192" height="192" rx="40"/>
  <!-- Outer ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="8"/>
  <!-- Progress ring -->
  <circle cx="96" cy="96" r="72" fill="none" stroke="url(#ring)" stroke-width="8" 
    stroke-dasharray="320 453" stroke-dashoffset="0" stroke-linecap="round"
    transform="rotate(-90 96 96)"/>
  <!-- Runner emoji -->
  <text x="96" y="118" font-size="80" text-anchor="middle">🏃</text>
  <!-- Step count hint -->
  <text x="96" y="168" font-size="14" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-weight="bold" font-family="-apple-system,BlinkMacSystemFont,sans-serif">10,000</text>
</svg>
